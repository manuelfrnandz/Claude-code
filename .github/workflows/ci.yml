name: CI

on:
  push:
    branches: [main, "claude/*"]
  pull_request:
    branches: [main]

jobs:
  test-api:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: waagent
          POSTGRES_PASSWORD: waagent_test
          POSTGRES_DB: whatsapp_agent_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint
        run: ruff check apps/ tests/

      - name: Type check
        run: mypy apps/api --ignore-missing-imports

      - name: Run tests
        env:
          DATABASE_URL: postgresql+asyncpg://waagent:waagent_test@localhost/whatsapp_agent_test
          DATABASE_URL_SYNC: postgresql://waagent:waagent_test@localhost/whatsapp_agent_test
          REDIS_URL: redis://localhost:6379/0
          APP_SECRET_KEY: test-secret-key-32-chars-minimum!!
          ANTHROPIC_API_KEY: test-key
          OPENAI_API_KEY: test-key
          META_APP_ID: test
          META_APP_SECRET: test
          META_VERIFY_TOKEN: test
        run: pytest tests/ --cov=apps/api --cov-report=xml -v
